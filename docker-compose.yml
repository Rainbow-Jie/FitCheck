version: "3.9"

services:
  # -----------------------------------------------
  # 后端服务
  # -----------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: fitcheck-backend:${APP_VERSION:-latest}
    container_name: fitcheck-backend
    restart: unless-stopped
    ports:
      - "20001:20001"
    environment:
      # 数据库连接（从 .env 注入，覆盖 application.yml）
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/${DB_NAME:-FitCheck}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # JWT 密钥
      JWT_SECRET: ${JWT_SECRET}
      # 文件上传路径（容器内）
      UPLOAD_PATH: /app/uploads
      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
      # JVM 参数
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai"
    volumes:
      # 头像/上传文件持久化到宿主机
      - ./data/uploads:/app/uploads
      # 日志持久化
      - ./data/logs:/app/logs
    networks:
      - fitcheck-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:20001/fitcheck-api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # -----------------------------------------------
  # Nginx 反向代理（可选：如果云服务器没有独立 Nginx）
  # -----------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: fitcheck-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro      # 前端构建产物
      - ./data/logs/nginx:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro                 # SSL 证书（可选）
    depends_on:
      - backend
    networks:
      - fitcheck-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  fitcheck-net:
    driver: bridge
