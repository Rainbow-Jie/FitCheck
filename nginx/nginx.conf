# =============================================
# FitCheck Nginx 配置（Docker 容器版）
# 放置于项目根 nginx/nginx.conf
# =============================================

# 后端上游（容器名 fitcheck-backend，同 docker-compose service name）
upstream fitcheck_backend {
    server backend:20001;
    keepalive 32;
}

# ---- HTTP（80 端口）----
server {
    listen 80;
    server_name _;          # 替换为你的域名，如 example.com

    # 限制请求体大小（头像上传）
    client_max_body_size 10m;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ---- 前端静态文件 ----
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源强缓存（hash 文件名自带版本，可长缓存）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # index.html 不缓存（保证总是拿最新版）
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ---- API 反向代理 ----
    location /fitcheck-api/ {
        proxy_pass         http://fitcheck_backend/fitcheck-api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 超时配置
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # 头像上传允许稍大请求体
        client_max_body_size 10m;
    }

    # ---- 头像图片代理到后端 ----
    location /fitcheck-api/avatar/ {
        proxy_pass         http://fitcheck_backend/fitcheck-api/avatar/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- 上传文件（头像）直接由 Nginx 提供，减少后端压力 ----
    # 如果你将 uploads 目录挂载到 Nginx 容器，可开启此 location
    # location /uploads/ {
    #     alias /app/uploads/;
    #     expires 7d;
    #     add_header Cache-Control "public";
    # }
}

